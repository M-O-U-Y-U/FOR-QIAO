<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phone OS // 郑巧专属</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 音频资源 -->
    <audio id="typing-sound" src="typing.mp3" loop></audio>
    <audio id="bgm-sound" src="bgm.mp3" loop></audio>

    <div class="device-screen">
        
        <!-- 第一阶段：黑屏打字机 -->
        <div id="boot-screen" class="screen active">
            <div class="typing-container">
                <p id="line1" class="typing-text"></p>
                <p id="line2" class="typing-text"></p>
            </div>
            <div id="breath-light" class="hidden"></div>
        </div>

        <!-- 第二阶段：锁屏界面 -->
        <div id="lock-screen" class="screen hidden">
            <div class="lock-header">
                <div class="lock-icon">🔒</div>
                <h1 class="live-time">00:00</h1>
                <p class="live-date">1月1日 星期一</p>
            </div>
            
            <!-- 消息推送提示 -->
            <div class="lock-notifications">
                <div class="notification-card">
                    <div class="noti-header">
                        <span class="noti-app">SYSTEM</span>
                        <span class="noti-time live-time">00:00</span>
                    </div>
                    <div class="noti-body">
                        <strong>系统提示</strong>
                        <p>请上滑解锁以验证身份</p>
                    </div>
                </div>
            </div>

            <div class="swipe-hint">
                <div class="chevron-up"></div>
                <p>向上滑动解锁</p>
            </div>
        </div>

        <!-- 第三阶段：桌面系统 -->
        <div id="home-screen" class="screen hidden">
            <!-- 状态栏感应区 (用于下拉) -->
            <div id="status-bar-trigger"></div>
            
            <!-- 顶部状态栏 -->
            <div class="status-bar">
                <div class="live-time-small live-time">00:00</div>
                <div class="status-icons">
                    <span>5G</span>
                    <span>📶</span>
                    <span>🔋</span>
                </div>
            </div>

            <!-- 下拉控制中心 -->
            <div id="control-center" class="control-center">
                <div class="cc-handle"></div>
                <div class="cc-header">控制中心</div>
                <div class="cc-widgets">
                    <div class="cc-box">Wi-Fi: 已连接 (Qiao_5G)</div>
                    <div class="cc-box">蓝牙: 已开启</div>
                    <div class="cc-box slider">亮度: 80%</div>
                    <div class="cc-box slider">音量: 50%</div>
                </div>
                <p class="cc-hint">向上滑动收起</p>
            </div>

            <!-- 网易云横幅通知 -->
            <div id="banner-notification" class="banner-notification">
                <div class="banner-icon">🎵</div>
                <div class="banner-content">
                    <h4>网易云音乐</h4>
                    <p>一起听发来一条消息...</p>
                </div>
            </div>

            <!-- 桌面主网格 -->
            <div class="app-grid">
                <!-- 真实时间天气小部件 -->
                <div class="widget-time-weather">
                    <div class="widget-left">
                        <h2 class="live-time">00:00</h2>
                        <p class="live-date">1月1日</p>
                    </div>
                    <div class="widget-right">
                        <div class="weather-icon">☀️</div>
                        <p>晴 26°C</p>
                        <span class="location">北海市</span>
                    </div>
                </div>

                <!-- 可点击的核心 APP -->
                <div class="app-icon" data-app="music">
                    <div class="icon-img music-bg">🎵</div>
                    <div class="badge" id="badge-music">1</div>
                    <span class="app-name">网易云音乐</span>
                </div>
                <div class="app-icon" data-app="wechat">
                    <div class="icon-img wechat-bg">💬</div>
                    <div class="badge" id="badge-wechat">999+</div>
                    <span class="app-name">微信</span>
                </div>
                <div class="app-icon" data-app="qq">
                    <div class="icon-img qq-bg">🐧</div>
                    <div class="badge" id="badge-qq">99+</div>
                    <span class="app-name">QQ</span>
                </div>
                <div class="app-icon" data-app="study">
                    <div class="icon-img study-bg">🎓</div>
                    <div class="badge" id="badge-study">1</div>
                    <span class="app-name">学习通</span>
                </div>
                <div class="app-icon" data-app="game">
                    <div class="icon-img game-bg">👑</div>
                    <div class="badge" id="badge-game">1</div>
                    <span class="app-name">王者荣耀</span>
                </div>
                <div class="app-icon" data-app="steam">
                    <div class="icon-img steam-bg">♨️</div>
                    <div class="badge" id="badge-steam">1</div>
                    <span class="app-name">Steam</span>
                </div>

                <!-- 模糊的装饰 APP -->
                <div class="app-icon blur-app"><div class="icon-img default-bg">⚙️</div><span class="app-name">设置</span></div>
                <div class="app-icon blur-app"><div class="icon-img default-bg">📷</div><span class="app-name">相机</span></div>
                <div class="app-icon blur-app"><div class="icon-img default-bg">📝</div><span class="app-name">备忘录</span></div>
                <div class="app-icon blur-app"><div class="icon-img default-bg">🗺️</div><span class="app-name">地图</span></div>
            </div>

            <!-- 底部 Dock 栏 -->
            <div class="dock">
                <div class="app-icon blur-app"><div class="icon-img default-bg">📞</div></div>
                <div class="app-icon blur-app"><div class="icon-img default-bg">✉️</div></div>
                <div class="app-icon blur-app"><div class="icon-img default-bg">🌐</div></div>
                <div class="app-icon blur-app"><div class="icon-img default-bg">📁</div></div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
