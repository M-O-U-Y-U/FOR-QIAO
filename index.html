<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给郑巧的专属链接 // ACCESS GRANTED</title>
    <style>
        :root {
            --gift-pink: #ff748c;
            --cyber-bg: #0d0d0d;
        }
        body {
            background-color: var(--cyber-bg);
            color: var(--gift-pink);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        /* 像素心跳动画 */
        .heart {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 20px var(--gift-pink); }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .text-container {
            text-align: center;
            border: 1px solid var(--gift-pink);
            padding: 30px;
            background: rgba(255, 116, 140, 0.05);
            box-shadow: 0 0 15px rgba(255, 116, 140, 0.2);
        }
        h1 { font-size: 1.5rem; letter-spacing: 2px; }
        .timer { font-size: 1.2rem; margin-top: 10px; opacity: 0.8; }
        .loading-bar {
            width: 200px;
            height: 4px;
            background: #222;
            margin: 20px auto;
            position: relative;
        }
        .loading-progress {
            position: absolute;
            height: 100%;
            background: var(--gift-pink);
            width: 40%; /* 预留进度 */
            animation: load 3s infinite alternate;
        }
        @keyframes load {
            from { width: 10%; }
            to { width: 90%; }
        }
    </style>
</head>
<body>
    <div class="heart">❤</div>
    <div class="text-container">
        <h1>TARGET: 郑巧</h1>
        <p>STATUS: 生日 & 520 礼物模块加载中...</p >
        <div class="loading-bar"><div class="loading-progress"></div></div>
        <div class="timer" id="countdown">计算剩余响应时间...</div>
    </div>

    <script>
        // 你可以把时间改成她的生日或者520那天
        const targetDate = new Date('2026-05-20T00:00:00').getTime();
        function update() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('countdown').innerText = `距离惊喜完全解密还有: ${days} 天`;
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
