<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给郑巧的专属链接 // ACCESS GRANTED</title>
    <style>
        :root {
            --gift-pink: #ff748c;
            --cyber-bg: #0d0d0d;
        }
        body {
            background-color: var(--cyber-bg);
            color: var(--gift-pink);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        /* 像素心跳动画 */
        .heart {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 20px var(--gift-pink); }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .text-container {
            text-align: center;
            border: 1px solid var(--gift-pink);
            padding: 30px;
            background: rgba(255, 116, 140, 0.05);
            box-shadow: 0 0 15px rgba(255, 116, 140, 0.2);
            position: relative;
            z-index: 10;
        }
        h1 { 
            font-size: 1.8rem; 
            letter-spacing: 3px; 
            margin-top: 0;
            text-transform: uppercase;
        }
        p {
            font-size: 1.1rem;
            letter-spacing: 1px;
            margin: 15px 0;
        }
        .timer { 
            font-size: 1.3rem; 
            margin-top: 15px; 
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 5px var(--gift-pink);
        }
        .loading-bar {
            width: 250px;
            height: 4px;
            background: #222;
            margin: 25px auto;
            position: relative;
            overflow: hidden;
        }
        .loading-progress {
            position: absolute;
            height: 100%;
            background: var(--gift-pink);
            width: 40%; 
            animation: load 3s infinite alternate;
        }
        @keyframes load {
            from { width: 10%; }
            to { width: 90%; }
        }
        
        /* 增加一点网格背景提升极客感 */
        .grid-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(255, 116, 140, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 116, 140, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="heart">❤</div>
    <div class="text-container">
        <h1>TARGET: 郑巧</h1>
        <p>STATUS: 生日 & 520 礼物模块加载中...</p >
        <div class="loading-bar"><div class="loading-progress"></div></div>
        <div class="timer" id="countdown">计算剩余响应时间...</div>
    </div>

    <script>
        // 目标时间设定为 2026年5月20日 00:00:00
        const targetDate = new Date('2026-05-20T00:00:00').getTime();
        
        function update() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            
            if (diff > 0) {
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const secs = Math.floor((diff % (1000 * 60)) / 1000);
                
                document.getElementById('countdown').innerHTML = 
                    `距离惊喜完全解密还有:<br><br>${days}天 ${hours}小时 ${mins}分 ${secs}秒`;
            } else {
                document.getElementById('countdown').innerHTML = "解密完成！请期待接下来的惊喜。";
                document.querySelector('.loading-progress').style.width = '100%';
                document.querySelector('.loading-progress').style.animation = 'none';
            }
        }
        
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
